<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

h1{
padding:20px;
margin:0;
background:#1f2937;
color:white;
}

/* CONTENEDOR CATEGORIAS */

#categorias{
padding:15px;
display:flex;
flex-wrap:wrap;
}

/* BOTONES DESKTOP */

#categorias button{
margin:5px;
padding:10px 18px;
border-radius:8px;
border:none;
background:#374151;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

#categorias button:hover{
background:#2563eb;
}

#categorias button.active{
background:#22c55e;
}

/* SELECTOR MOBILE */

#categoriaSelect{
display:none;
width:90%;
margin:15px;
padding:12px;
font-size:16px;
border-radius:8px;
}

/* GRID PRODUCTOS */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:25px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
color:#16a34a;
font-weight:bold;
font-size:18px;
}

/* RESPONSIVE */

@media (max-width:768px){

#categorias{
display:none;
}

#categoriaSelect{
display:block;
}

.grid{
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card img{
height:140px;
}

}

.buy-btn{
display:inline-block;
margin-top:10px;
padding:10px 14px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.buy-btn:hover{
background:#1ebe5d;
}

/* BUSCADOR */

.buscador-container{
padding:20px;
display:flex;
justify-content:center;
}

#buscador{
width:60%;
max-width:500px;
padding:12px 15px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
outline:none;
}

#buscador:focus{
border:1px solid #2563eb;
box-shadow:0 0 4px rgba(37,99,235,0.3);
}

/* MOBILE */

@media (max-width:768px){

#buscador{
width:90%;
}

}

/* BOTON WHATSAPP FLOTANTE */

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
z-index:999;
}

.whatsapp-float:hover{
background:#1ebe5d;
}  

#ordenar{
margin-left:15px;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

@media (max-width:768px){

.buscador-container{
flex-direction:column;
gap:10px;
}

#ordenar{
margin-left:0;
width:90%;
}

}

.carrito-float{
position:fixed;
bottom:100px;
right:20px;
background:#2563eb;
color:white;
padding:15px 18px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.carrito-float span{
background:white;
color:black;
padding:3px 7px;
border-radius:10px;
margin-left:5px;
}
  
</style>

</head>

<body>

<h1>Catálogo de productos</h1>

<div class="buscador-container">

<input
type="text"
id="buscador"
placeholder="🔎 Buscar productos..."
onkeyup="buscarProducto()"
/>

<select id="ordenar" onchange="ordenarProductos()">

<option value="">Ordenar por</option>
<option value="mayor">Mayor precio</option>
<option value="menor">Menor precio</option>
<option value="az">A-Z</option>
<option value="za">Z-A</option>

</select>

</div>

<select id="categoriaSelect"></select>

<div id="categorias"></div>

<div id="productos" class="grid"></div>

<script>

const params = new URLSearchParams(window.location.search)
const categoriaURL = params.get("categoria")  

let categorias = {}
let carrito = []

fetch("./productos.json")
.then(r=>r.json())
.then(data=>{

data.forEach(p => {

let cat = p.category || "Otros"

cat = cat.toLowerCase().trim()

if(cat.includes("combo")) cat = "Combos"
else if(cat.includes("electro")) cat = "Electrodomésticos"
else if(cat.includes("belleza")) cat = "Belleza"
else if(cat.includes("hogar")) cat = "Hogar"
else if(cat.includes("bazar")) cat = "Bazar"
else if(cat.includes("audio") || cat.includes("electron")) cat = "Electrónica y Audio"
else if(cat.includes("celular")) cat = "Celulares"
else if(cat.includes("comput")) cat = "Computación"
else if(cat.includes("herramient")) cat = "Herramientas"
else if(cat.includes("librer")) cat = "Librería"
else if(cat.includes("juguete")) cat = "Juguetes"
else if(cat.includes("pesca")) cat = "Pesca"
else if(cat.includes("zapat")) cat = "Zapatillas"
else if(cat.includes("vehiculo")) cat = "Accesorios Vehículos"
else cat = "Otros"

p.category = cat

if(!categorias[cat]) categorias[cat] = []

categorias[cat].push(p)

})

const ordenCategorias = [

"Combos",
"Electrodomésticos",
"Belleza",
"Hogar",
"Bazar",
"Electrónica y Audio",
"Celulares",
"Computación",
"Herramientas",
"Librería",
"Juguetes",
"Pesca",
"Zapatillas",
"Accesorios Vehículos",
"Otros"

]

const catDiv = document.getElementById("categorias")
const select = document.getElementById("categoriaSelect")

ordenCategorias.forEach(cat => {

if(categorias[cat]){

const btn = document.createElement("button")
btn.textContent = cat
btn.onclick = () => mostrarCategoria(cat)

catDiv.appendChild(btn)

const opt = document.createElement("option")
opt.value = cat
opt.textContent = cat

select.appendChild(opt)

}

})

select.onchange = function(){
mostrarCategoria(this.value)
}

if(categoriaURL && categorias[categoriaURL]){

mostrarCategoria(categoriaURL)
select.value=categoriaURL

}else if(categorias["Combos"]){

mostrarCategoria("Combos")
select.value="Combos"

}else{

const primera = Object.keys(categorias)[0]
mostrarCategoria(primera)
select.value=primera

}

})

function mostrarCategoria(cat){

const contenedor = document.getElementById("productos")

contenedor.innerHTML = ""

document.querySelectorAll("#categorias button").forEach(b=>{
b.classList.remove("active")

if(b.textContent === cat){
b.classList.add("active")
}

})

categorias[cat].forEach(p => {

contenedor.innerHTML += `
<div class="card">

<a href="producto.html?nombre=${encodeURIComponent(p.name)}&cat=${encodeURIComponent(cat)}">

<img src="${p.image}" loading="lazy">

</a>

<h4>${p.name}</h4>
<p class="price">${p.price}</p>

<button class="buy-btn" onclick="agregarCarrito('${p.name}','${p.price}','${p.image}')">
Agregar al carrito
</button>

</div>
`

})

}

function buscarProducto(){

const texto = document.getElementById("buscador").value.toLowerCase()

const contenedor = document.getElementById("productos")

contenedor.innerHTML = ""

Object.values(categorias).flat().forEach(p=>{

if(p.name.toLowerCase().includes(texto)){

contenedor.innerHTML += `
<div class="card">
<a href="producto.html?nombre=${encodeURIComponent(p.name)}&cat=${encodeURIComponent(p.category)}">
<img src="${p.image}" loading="lazy">
</a>
<h4>${p.name}</h4>
<p class="price">${p.price}</p>

<button class="buy-btn" onclick="agregarCarrito('${p.name}','${p.price}','${p.image}')">
Agregar al carrito
</button>

</div>
`

}

})

}

function ordenarProductos(){

const tipo = document.getElementById("ordenar").value

let productos = Object.values(categorias).flat()

if(tipo === "mayor"){
productos.sort((a,b)=>parsePrecio(b.price)-parsePrecio(a.price))
}

if(tipo === "menor"){
productos.sort((a,b)=>parsePrecio(a.price)-parsePrecio(b.price))
}

if(tipo === "az"){
productos.sort((a,b)=>a.name.localeCompare(b.name))
}

if(tipo === "za"){
productos.sort((a,b)=>b.name.localeCompare(a.name))
}

mostrarLista(productos)

}

function parsePrecio(precio){

return Number(
precio.replace("$","")
.replace(/\./g,"")
.replace(",",".")
)

}

function mostrarLista(lista){

const contenedor = document.getElementById("productos")
contenedor.innerHTML=""

lista.forEach(p=>{

contenedor.innerHTML+=`
<div class="card">

<a href="producto.html?nombre=${encodeURIComponent(p.name)}&cat=${encodeURIComponent(p.category)}">

<img src="${p.image}" loading="lazy">

</a>

<h4>${p.name}</h4>
<p class="price">${p.price}</p>

<button class="buy-btn" onclick="agregarCarrito('${p.name}','${p.price}','${p.image}')">
Agregar al carrito
</button>

</div>
`

})

}

function agregarCarrito(nombre,precio,imagen){

const producto = carrito.find(p => p.name === nombre)

if(producto){

producto.cantidad++

}else{

carrito.push({
name:nombre,
price:precio,
image:imagen,
cantidad:1
})

}

actualizarContador()

}

function actualizarContador(){

let total = 0

carrito.forEach(p=>{
total += p.cantidad
})

document.getElementById("contadorCarrito").innerText = total

}


function abrirCarrito(){

const panel = document.getElementById("carritoPanel")

panel.style.display = panel.style.display === "none" ? "block" : "none"

mostrarCarrito()

}

function mostrarCarrito(){

const contenedor = document.getElementById("listaCarrito")

contenedor.innerHTML=""

if(carrito.length===0){

contenedor.innerHTML="<p>El carrito está vacío</p>"
return

}

carrito.forEach((p,index)=>{

contenedor.innerHTML+=`
<div style="border-bottom:1px solid #eee;padding:10px 0">

<b>${p.name}</b><br>

<div style="display:flex;gap:10px;margin-top:5px">

<button onclick="restarCantidad(${index})">-</button>

<span>${p.cantidad}</span>

<button onclick="sumarCantidad(${index})">+</button>

</div>

Total: $${(parsePrecio(p.price) * p.cantidad).toLocaleString()}

</div>
`

})

}

function sumarCantidad(index){

carrito[index].cantidad++

actualizarContador()
mostrarCarrito()

}

function restarCantidad(index){

if(carrito[index].cantidad > 1){

carrito[index].cantidad--

}else{

carrito.splice(index,1)

}

actualizarContador()
mostrarCarrito()

}

function enviarPedido(){

if(carrito.length === 0){

alert("El carrito está vacío")
return

}

let mensaje = "Hola quiero comprar:%0A%0A"
let total = 0

carrito.forEach(p=>{

let subtotal = parsePrecio(p.price) * p.cantidad
total += subtotal

mensaje += `${p.cantidad} x ${p.name} - $${subtotal.toLocaleString()}%0A`

})

mensaje += `%0ATotal: $${total.toLocaleString()}`

window.open(`https://wa.me/5493401415127?text=${mensaje}`)

}
  
</script>
<a
href="https://wa.me/5493401415127?text=Hola%20quiero%20ver%20el%20catalogo"
class="whatsapp-float"
target="_blank"
>

💬

</a>  

<a class="carrito-float" onclick="abrirCarrito()">
🛒 <span id="contadorCarrito">0</span>
</a>

<div id="carritoPanel" style="display:none; position:fixed; right:0; top:0; width:350px; height:100%; background:white; box-shadow:-5px 0 20px rgba(0,0,0,0.2); padding:20px; overflow:auto;">

<h2>Tu carrito</h2>

<div id="listaCarrito"></div>

<button onclick="enviarPedido()" style="margin-top:20px;padding:12px;background:#25D366;color:white;border:none;border-radius:6px;font-weight:bold;width:100%;">
Enviar pedido por WhatsApp
</button>

</div>
  
</body>

</html>
