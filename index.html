<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Catálogo</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

h1{
padding:20px;
margin:0;
background:#1f2937;
color:white;
}

/* BOTONES DE CATEGORIA */

#categorias{
padding:15px;
}

#categorias button{
margin:5px;
padding:10px 18px;
border-radius:8px;
border:none;
background:#374151;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

#categorias button:hover{
background:#2563eb;
}

/* BOTON ACTIVO */

#categorias button.active{
background:#22c55e;
color:white;
}

/* GRID PRODUCTOS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
padding:25px;
}

/* TARJETA PRODUCTO */

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;

box-shadow:0 8px 18px rgba(0,0,0,0.08);

transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
color:#16a34a;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<h1>Catálogo de productos</h1>

<div id="categorias"></div>

<div id="productos" class="grid"></div>

<script>

let categorias = {}

fetch("./productos.json")

.then(r=>r.json())

.then(data=>{

/* ORGANIZAR PRODUCTOS POR CATEGORIA */

data.forEach(p => {

let cat = p.category || "Otros"

cat = cat.toLowerCase().trim()

if(cat.includes("combo")) cat = "Combos"
else if(cat.includes("electro")) cat = "Electrodomésticos"
else if(cat.includes("belleza")) cat = "Belleza"
else if(cat.includes("hogar")) cat = "Hogar"
else if(cat.includes("bazar")) cat = "Bazar"
else if(cat.includes("audio") || cat.includes("electron")) cat = "Electrónica y Audio"
else if(cat.includes("celular")) cat = "Celulares"
else if(cat.includes("comput")) cat = "Computación"
else if(cat.includes("herramient")) cat = "Herramientas"
else if(cat.includes("librer")) cat = "Librería"
else if(cat.includes("juguete")) cat = "Juguetes"
else if(cat.includes("pesca")) cat = "Pesca"
else if(cat.includes("zapat")) cat = "Zapatillas"
else if(cat.includes("vehiculo")) cat = "Accesorios Vehículos"
else cat = "Otros"

p.category = cat

if(!categorias[cat]) categorias[cat] = []

categorias[cat].push(p)

})

/* ORDEN VISUAL DE CATEGORIAS */

const ordenCategorias = [

"Combos",
"Electrodomésticos",
"Belleza",
"Hogar",
"Bazar",
"Electrónica y Audio",
"Celulares",
"Computación",
"Herramientas",
"Librería",
"Juguetes",
"Pesca",
"Zapatillas",
"Accesorios Vehículos"

]

const catDiv = document.getElementById("categorias")

/* CREAR BOTONES */

ordenCategorias.forEach(cat => {

if(categorias[cat]){

catDiv.innerHTML += `
<button onclick="mostrarCategoria('${cat}')">
${cat}
</button>
`

}

})

// mostrar Combos al cargar
if(categorias["Combos"]){
mostrarCategoria("Combos")
}

/* SI EXISTEN OTRAS CATEGORIAS NO LISTADAS */

Object.keys(categorias).forEach(cat => {

if(!ordenCategorias.includes(cat)){

catDiv.innerHTML += `
<button onclick="mostrarCategoria('${cat}')">
${cat}
</button>
`

}

})

/* MOSTRAR PRIMERA CATEGORIA */

const primeraCategoria = Object.keys(categorias)[0]

mostrarCategoria(primeraCategoria)

})


function mostrarCategoria(cat){

const contenedor = document.getElementById("productos")
contenedor.innerHTML = ""

// quitar active de todos
document.querySelectorAll("#categorias button").forEach(b=>{
b.classList.remove("active")
})

// activar botón correcto
document.querySelectorAll("#categorias button").forEach(b=>{
if(b.textContent === cat){
b.classList.add("active")
}
})

categorias[cat].forEach(p => {

let img = p.image

contenedor.innerHTML += `
<div class="card">
<img src="${img}" loading="lazy">
<h4>${p.name}</h4>
<p class="price">${p.price}</p>
</div>
`

})

}
  
</script>

</body>

</html>
