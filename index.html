<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

h1{
background:#1f2937;
color:white;
padding:20px;
margin:0;
}

/* BUSCADOR */

.buscador-container{
padding:20px;
display:flex;
justify-content:center;
}

#buscador{
width:60%;
max-width:500px;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

/* CATEGORIAS */

#categorias{
padding:15px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

#categorias button{
padding:8px 14px;
border:none;
border-radius:20px;
background:#374151;
color:white;
cursor:pointer;
}

#categorias button.active{
background:#22c55e;
}

/* GRID PRODUCTOS */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:25px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
color:#16a34a;
font-weight:bold;
font-size:18px;
}

.buy-btn{
margin-top:10px;
padding:10px 14px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* CARRITO */

.carrito-float{
position:fixed;
bottom:90px;
right:20px;
background:#2563eb;
color:white;
padding:15px 18px;
border-radius:50px;
cursor:pointer;
}

.carrito-float span{
background:white;
color:black;
padding:3px 7px;
border-radius:10px;
margin-left:5px;
}

#carritoPanel{
display:none;
position:fixed;
right:0;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
overflow:auto;
z-index:999;
}

</style>
</head>

<body>

<h1>Catálogo de productos</h1>

<div class="buscador-container">
<input id="buscador" placeholder="Buscar producto..." onkeyup="buscarProducto()">
</div>

<div id="categorias"></div>

<div id="productos" class="grid"></div>

<div class="carrito-float" onclick="abrirCarrito()">
🛒 <span id="contadorCarrito">0</span>
</div>

<div id="carritoPanel">

<div style="display:flex;justify-content:space-between;align-items:center;">
<h2>Tu carrito</h2>
<button onclick="cerrarCarrito()">✕</button>
</div>

<div id="listaCarrito"></div>

<button onclick="enviarPedido()" style="margin-top:20px;padding:12px;background:#25D366;color:white;border:none;border-radius:6px;width:100%;">
Enviar pedido por WhatsApp
</button>

</div>

<script>

let categorias = {}
let carrito = []

fetch("./productos.json")
.then(r=>r.json())
.then(data=>{

data.forEach(p=>{

let cat = p.category || "Otros"
cat = cat.toLowerCase()

if(cat.includes("combo")) cat="Combos"
else if(cat.includes("electro")) cat="Electrodomésticos"
else if(cat.includes("belleza")) cat="Belleza"
else if(cat.includes("hogar")) cat="Hogar"
else if(cat.includes("bazar")) cat="Bazar"
else if(cat.includes("herramient")) cat="Herramientas"
else cat="Otros"

p.category = cat

if(!categorias[cat]) categorias[cat]=[]
categorias[cat].push(p)

})

crearCategorias()

})

function crearCategorias(){

const cont=document.getElementById("categorias")

Object.keys(categorias).forEach(cat=>{

const btn=document.createElement("button")
btn.innerText=cat
btn.onclick=()=>mostrarCategoria(cat)

cont.appendChild(btn)

})

mostrarCategoria(Object.keys(categorias)[0])

}

function mostrarCategoria(cat){

const cont=document.getElementById("productos")
cont.innerHTML=""

document.querySelectorAll("#categorias button").forEach(b=>b.classList.remove("active"))

document.querySelectorAll("#categorias button").forEach(b=>{
if(b.innerText===cat) b.classList.add("active")
})

categorias[cat].forEach(p=>{

cont.innerHTML+=`
<div class="card">

<img src="${p.image}">

<h4>${p.name}</h4>

<p class="price">${p.price}</p>

<button class="buy-btn" onclick="agregarCarrito('${p.name}','${p.price}','${p.image}')">
Agregar al carrito
</button>

</div>
`

})

}

function buscarProducto(){

const texto=document.getElementById("buscador").value.toLowerCase()

const cont=document.getElementById("productos")
cont.innerHTML=""

Object.values(categorias).flat().forEach(p=>{

if(p.name.toLowerCase().includes(texto)){

cont.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p class="price">${p.price}</p>
<button class="buy-btn" onclick="agregarCarrito('${p.name}','${p.price}','${p.image}')">
Agregar al carrito
</button>
</div>
`

}

})

}

function agregarCarrito(nombre,precio,imagen){

const prod=carrito.find(p=>p.name===nombre)

if(prod){
prod.cantidad++
}else{
carrito.push({name:nombre,price:precio,image:imagen,cantidad:1})
}

actualizarContador()

if(document.getElementById("carritoPanel").style.display==="block"){
mostrarCarrito()
}

}

function actualizarContador(){

let total=0
carrito.forEach(p=> total+=p.cantidad)

document.getElementById("contadorCarrito").innerText=total

}

function abrirCarrito(){

document.getElementById("carritoPanel").style.display="block"
mostrarCarrito()

}

function cerrarCarrito(){

document.getElementById("carritoPanel").style.display="none"

}

function mostrarCarrito(){

const cont=document.getElementById("listaCarrito")
cont.innerHTML=""

if(carrito.length===0){
cont.innerHTML="Carrito vacío"
return
}

carrito.forEach((p,i)=>{

cont.innerHTML+=`

<div style="border-bottom:1px solid #ddd;padding:10px">

<b>${p.name}</b>

<div>

<button onclick="restarCantidad(${i})">-</button>

${p.cantidad}

<button onclick="sumarCantidad(${i})">+</button>

</div>

Total $${(parsePrecio(p.price)*p.cantidad).toLocaleString()}

</div>

`

})

}

function sumarCantidad(i){

carrito[i].cantidad++
actualizarContador()
mostrarCarrito()

}

function restarCantidad(i){

if(carrito[i].cantidad>1){
carrito[i].cantidad--
}else{
carrito.splice(i,1)
}

actualizarContador()
mostrarCarrito()

}

function parsePrecio(precio){
return Number(precio.replace("$","").replace(/\./g,""))
}

function enviarPedido(){

if(carrito.length===0){
alert("Carrito vacío")
return
}

let msg="Hola quiero comprar:%0A%0A"
let total=0

carrito.forEach(p=>{

let sub=parsePrecio(p.price)*p.cantidad
total+=sub

msg+=`${p.cantidad} x ${p.name} - $${sub.toLocaleString()}%0A`

})

msg+=`%0ATotal: $${total.toLocaleString()}`

window.open(`https://wa.me/5493401415127?text=${msg}`)

}

</script>

</body>
</html>
