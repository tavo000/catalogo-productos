<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Catálogo</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

h1{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
color:#009900;
font-weight:bold;
}

button{
margin:5px;
padding:8px 15px;
border-radius:6px;
border:none;
background:#333;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#555;
}

#categorias{
margin:20px;
}

</style>

</head>

<body>

<h1>Catálogo de productos</h1>

<div id="categorias"></div>

<div id="productos" class="grid"></div>

<script>

let categorias = {}

fetch("./productos.json")

.then(r=>r.json())

.then(data=>{

/* ORGANIZAR PRODUCTOS POR CATEGORIA */

data.forEach(p => {

let cat = p.category || "Otros"

cat = cat.toLowerCase().trim()

if(cat.includes("combo")) cat = "Combos"
else if(cat.includes("electro")) cat = "Electrodomésticos"
else if(cat.includes("belleza")) cat = "Belleza"
else if(cat.includes("hogar")) cat = "Hogar"
else if(cat.includes("bazar")) cat = "Bazar"
else if(cat.includes("audio") || cat.includes("electron")) cat = "Electrónica y Audio"
else if(cat.includes("celular")) cat = "Celulares"
else if(cat.includes("comput")) cat = "Computación"
else if(cat.includes("herramient")) cat = "Herramientas"
else if(cat.includes("librer")) cat = "Librería"
else if(cat.includes("juguete")) cat = "Juguetes"
else if(cat.includes("pesca")) cat = "Pesca"
else if(cat.includes("zapat")) cat = "Zapatillas"
else if(cat.includes("vehiculo")) cat = "Accesorios Vehículos"
else cat = "Otros"

p.category = cat

if(!categorias[cat]) categorias[cat] = []

categorias[cat].push(p)

})

/* ORDEN VISUAL DE CATEGORIAS */

const ordenCategorias = [

"Combos",
"Electrodomésticos",
"Belleza",
"Hogar",
"Bazar",
"Electrónica y Audio",
"Celulares",
"Computación",
"Herramientas",
"Librería",
"Juguetes",
"Pesca",
"Zapatillas",
"Accesorios Vehículos"

]

const catDiv = document.getElementById("categorias")

/* CREAR BOTONES */

ordenCategorias.forEach(cat => {

if(categorias[cat]){

catDiv.innerHTML += `
<button onclick="mostrarCategoria('${cat}')">
${cat}
</button>
`

}

})

/* SI EXISTEN OTRAS CATEGORIAS NO LISTADAS */

Object.keys(categorias).forEach(cat => {

if(!ordenCategorias.includes(cat)){

catDiv.innerHTML += `
<button onclick="mostrarCategoria('${cat}')">
${cat}
</button>
`

}

})

/* MOSTRAR PRIMERA CATEGORIA */

const primeraCategoria = Object.keys(categorias)[0]

mostrarCategoria(primeraCategoria)

})


function mostrarCategoria(cat){

const contenedor = document.getElementById("productos")

contenedor.innerHTML = ""

categorias[cat].forEach(p => {

let img = p.image

if(!img.startsWith("http")){
img = "https://tua.ar/" + img
}

contenedor.innerHTML += `

<div class="card">

<img src="${img}" loading="lazy">

<h4>${p.name}</h4>

<p class="price">${p.price}</p>

</div>

`

})

}

</script>

</body>

</html>
